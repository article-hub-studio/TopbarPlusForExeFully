    <text x="560" y="522" font-size="17" fill="#f0f0f2" font-weight="600">game:GetService → __gs(name)</text>
    <text x="560" y="546" font-size="13" fill="#9a9aa2">cloneref + cache theo tên service</text>
    <text x="560" y="565" font-size="13" fill="#9a9aa2">game gốc vẫn nguyên vẹn cho FindFirstChild, IsA...</text>

    <line x1="240" y1="430" x2="240" y2="490" stroke="#d6d6dc" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="50" y="490" width="380" height="90" rx="12" fill="#141416" stroke="#4a4a52"/>
    <text x="70" y="522" font-size="17" fill="#f0f0f2" font-weight="600">getgenv().__TopbarPlusExecutorBuild</text>
    <text x="70" y="546" font-size="13" fill="#9a9aa2">cache singleton — loadstring lại</text>
    <text x="70" y="565" font-size="13" fill="#9a9aa2">không build lại từ đầu trong 1 session</text>

