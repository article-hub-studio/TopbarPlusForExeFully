    <text x="560" y="362" font-size="17" fill="#f0f0f2" font-weight="600">__import(node) cache</text>
    <text x="560" y="384" font-size="13" fill="#9a9aa2">local function fnX(script, require)</text>
    <text x="560" y="404" font-size="13" fill="#9a9aa2">  -- code gốc, không sửa nội dung</text>
    <text x="560" y="424" font-size="13" fill="#9a9aa2">end</text>

